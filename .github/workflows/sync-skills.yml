name: Sync Skills

# Distributes canonical skills/ content to agent-specific directories.
# Runs on every push to main that touches skills/ or the agent rule files.

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - ".cursor/rules/**"
      - ".windsurf/rules/**"
      - ".clinerules/**"
      - "CLAUDE.md"
      - "AGENTS.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync skills to agent-specific directories
        run: |
          set -euo pipefail

          echo "Syncing skills to agent rule directories..."

          # Cursor: .cursor/skills/<skill>/SKILL.md
          mkdir -p .cursor/skills
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            mkdir -p ".cursor/skills/$skill_name"
            cp "$skill_dir/SKILL.md" ".cursor/skills/$skill_name/SKILL.md"
          done
          echo "Synced $(ls skills/ | wc -l) skills to .cursor/skills/"

          # Windsurf: .windsurf/skills/<skill>/SKILL.md
          mkdir -p .windsurf/skills
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            mkdir -p ".windsurf/skills/$skill_name"
            cp "$skill_dir/SKILL.md" ".windsurf/skills/$skill_name/SKILL.md"
          done
          echo "Synced $(ls skills/ | wc -l) skills to .windsurf/skills/"

          # .clinerules/: copy each skill as a flat file
          mkdir -p .clinerules
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            cp "$skill_dir/SKILL.md" ".clinerules/$skill_name.md"
          done
          echo "Synced $(ls skills/ | wc -l) skills to .clinerules/"

      - name: Commit synced files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .cursor/skills/ .windsurf/skills/ .clinerules/

          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "chore: sync skills to agent directories [skip ci]"
            git push
            echo "Skills synced and committed."
          fi
