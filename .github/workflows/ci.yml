name: SENTINEL CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure VERSION was bumped
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          BASE_VERSION="$(git show "${{ github.event.pull_request.base.sha }}:VERSION")"
          HEAD_VERSION="$(git show "${{ github.event.pull_request.head.sha }}:VERSION")"
          if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            echo "::error::VERSION not bumped. Bump VERSION before merging."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check sentinel

      - name: Format check (black)
        run: uv run black --check sentinel

      - name: Type-check (mypy)
        run: uv run mypy sentinel

      - name: Test
        run: uv run pytest --cov=sentinel tests/
