name: SENTINEL CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      version_changed: ${{ steps.ver.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if VERSION changed
        id: ver
        run: |
          NULL_SHA="0000000000000000000000000000000000000000"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "${NULL_SHA}" ]; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            RANGE="HEAD~1..HEAD"
          fi
          if git diff --quiet "${RANGE}" -- VERSION; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          else
            echo "changed=true"  >> $GITHUB_OUTPUT
            echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ensure static manifests are version-synced
        shell: bash
        run: |
          python scripts/sync_version.py --dry-run | tee /tmp/version-sync.txt
          if ! grep -q "0 file(s) would be updated." /tmp/version-sync.txt; then
            echo "::error::Static manifests are out of sync with VERSION. Run: python scripts/sync_version.py and commit the updates."
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 2. Tag & GitHub Release ──────────────────────────────────────────────────
  release:
    name: Tag & GitHub Release
    needs: build
    if: needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create and push tag
        id: tag
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists — skipping."
            echo "created=false" >> $GITHUB_OUTPUT
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "created=true" >> $GITHUB_OUTPUT
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: SENTINEL ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*
